<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ordenar Boxes</title>
    <style>
        .contenedor{
            position: relative;
            border: 2px dashed #333;
            width: 500px;
            height: 200px;
        }
        .box-1{
            background-color: #ff4757;
            position: absolute;
            top: 0;
            left: 0;
            width: 100px;
            padding: 15px;
            color: black;
            text-align: center;
        }
        .box-2{
            background-color: #ffa947;
            position: absolute;
            top: 0;
            right: 0px;
            width: 100px;
            padding: 15px;
            color: black;
            text-align: center;
        }
        .box-3{
            background-color: #f3ff47;
            position: absolute;
            bottom: 0;
            left: 0px;
            width: 100px;
            padding: 15px;
            color: black;
            text-align: center;
        }
         
         .box-4{
            background-color: #50ff47;
            position: absolute;
            bottom: 0;
            left: 0px;
            width: 100px;
            padding: 15px;
            color: black;
            text-align: center;

        }
         .box-5{
            background-color: #47f9ff;
            position: absolute;
            top: 80px;
            left: 200px;
            width: 100px;
            padding: 15px;
            color: black;
            text-align: center;

        }
    </style>
</head>
<body>
    <div class="contenedor">
        <div class="box-1">1</div>
        <div class="box-2">2</div>
        <div class="box-3">3</div>
        <div class="box-4">4</div>
        <div class="box-5">5</div>

    </div>
    
</body>
</html>
