<!DOCTYPE html>
<html>
    <head>
<meta charset="utf-8">
<title>Tarjeta de presentación</title>
<style>
  .Tarj{
    display: flex;
    flex-direction: column;
    width: 400px;
    font-family: sans-serif;
    height: 300px;
    box-shadow: 0px 0px 7px 0px lightgrey;
    border: 0;
  }
  .cuer{
    flex: 4;
    padding: 8px;
  }
  .titu{     
    flex: 1;
    background: black;
    display: flex;
    color: white;
    align-items: center;
    justify-content: center;
  }
  h4{
    padding:0
  }
  .pie{
    flex: 1;
    background: darkgray;
    display: flex;
    color: white;
    align-items: center;
    justify-content: center;
  }
</style>
</head>
<body>
<div class="Tarj">  
  <div class="titu"><h2>Tarjeta de presentación</h2></div>
  <div class="cuer">Contenido del cuerpo de la tarjeta</div>
  <div class="pie"><h4>Pie de la tarjeta</h4></div>
</div>  


</body></html>
